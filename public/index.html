<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Philosophy of Things</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-accents">
  <header class="topbar">
    <a href="/" class="topbar__logo">Philosophy of Things</a>
    <nav class="topbar__nav">
      <a href="/">Writings</a>
      <a href="/draft" class="topbar__cta" id="startWritingBtn">Start writing</a>
      <a href="#" class="topbar__link" id="logoutBtn" style="display:none">Log out</a>
    </nav>
  </header>

  <div class="hero" id="hero">
    <div class="hero__inner">
      <p class="hero__label">Philosophy of Things</p>
      <h1 class="hero__heading">Share a thought<br>with the world.</h1>
      <h2 class="hero__subheading"><em>Remember everything.</em></h2>
      <p class="hero__body">A place for essays, fragments, and the things<br>that stay with you long after you think them.</p>
      <a href="/draft" class="hero__button" id="heroBtn">Start writing</a>
      <p class="hero__author">by Yashashidara Pai</p>
    </div>
  </div>

  <main class="container" id="feedWrap" style="display:none">
    <div class="feed" id="feed"></div>
  </main>

  <a href="/draft" class="fab" title="New Draft" id="fabBtn">+</a>

  <footer class="site-footer">
    <div class="container">Philosophy of Things</div>
  </footer>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabaseUrl = 'https://ygcorlazwxovaqoiktgd.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlnY29ybGF6d3hvdmFxb2lrdGdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzE2OTIsImV4cCI6MjA4ODA0NzY5Mn0.aIx1HEHq6eMLDjMJpK-GVEI40oQ6I0ZwiUXmTGSHplc';

    const supabase = createClient(supabaseUrl, supabaseKey);

    const startWritingBtn = document.getElementById('startWritingBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const heroBtn = document.getElementById('heroBtn');
    const fabBtn = document.getElementById('fabBtn');

    let isLoggedIn = false;

    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      isLoggedIn = !!session;

      if (isLoggedIn) {
        logoutBtn.style.display = '';
      } else {
        logoutBtn.style.display = 'none';
      }
    }

    // Handle Start Writing click - check auth first
    function handleStartWriting(e) {
      if (!isLoggedIn) {
        e.preventDefault();
        window.location.href = '/login';
      }
      // If logged in, let the default href="/draft" work
    }

    startWritingBtn.addEventListener('click', handleStartWriting);
    heroBtn.addEventListener('click', handleStartWriting);
    fabBtn.addEventListener('click', handleStartWriting);

    // Handle logout
    logoutBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      await supabase.auth.signOut();
      isLoggedIn = false;
      logoutBtn.style.display = 'none';
    });

    checkAuth();
  </script>
  <script src="/js/explore.js"></script>
</body>
</html>
